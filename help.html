<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giới thiệu - TYTBOOKS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="top-auth-bar" style="background: #f1f1f1; border-bottom: 1px solid #e5e5e5; padding: 8px 0; font-family: Arial, sans-serif;">
        <div style="max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; font-size: 13px;">
            <div style="display: flex; gap: 25px;">
                <a href="help.html" style="color: #105b4d; font-weight: bold; text-decoration: none; display: flex; align-items: center; gap: 5px;">ⓘ Giới thiệu</a>
                <a href="news.html" style="color: #555; text-decoration: none; display: flex; align-items: center; gap: 5px; transition: 0.2s;" onmouseover="this.style.color='#105b4d'" onmouseout="this.style.color='#555'">📰 Tin tức</a>
            </div>
            <div style="display: flex; gap: 20px; align-items: center;">
                <a href="index.html" style="color: #555; text-decoration: none; display: flex; align-items: center; gap: 5px; transition: 0.2s;" onmouseover="this.style.color='#105b4d'" onmouseout="this.style.color='#555'">🏠 Quay về Trang chủ</a>
            </div>
        </div>
    </div>

    <header class="header" style="background: #105b4d; padding: 15px 0;">
        <div class="header-container" style="max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 20px;">
            <div class="logo">
                <h1 style="margin: 0; color: #fff;"><a href="index.html" style="text-decoration: none; color: inherit;">TYTBOOKS</a></h1>
            </div>
            <div class="search-bar" style="flex: 1; margin: 0 50px;">
                <div style="display: flex; border: 2px solid #fff; border-radius: 4px; overflow: hidden; max-width: 600px; margin: auto; background: #fff;">
                    <input type="text" placeholder="Bạn cần tìm gì?..." style="width: 100%; padding: 10px 15px; border: none; outline: none; font-size: 14px;">
                    <button style="padding: 10px 25px; background-color: #0b4036; border: none; cursor: pointer; color: #fff; font-weight: bold; font-size: 16px;">🔍</button>
                </div>
            </div>
            <div class="user-actions" style="display: flex; align-items: center; gap: 30px;">
                <div style="display: flex; align-items: center; gap: 10px; color: #fff;">
                    <span style="font-size: 28px;">🎧</span>
                    <div>
                        <div style="font-weight: bold; font-size: 16px;">0866 643 XXX</div>
                        <div style="font-size: 12px; color: #ddd;">Hot line</div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="main-content" style="background-color: #fcfcfc; padding: 40px 0; min-height: 50vh;">
        <div id="help-dynamic-content" style="max-width: 1200px; margin: 0 auto; padding: 0 20px; color: #333; line-height: 1.6;">
            <div style="text-align: center; padding: 50px 0; color: #999; font-style: italic;">
                Đang tải nội dung...
            </div>
        </div>
    </main>

    <footer style="background-color: #f8f9fa; border-top: 1px solid #eaeaea; color: #333; font-family: Arial, sans-serif;">
        <div style="background-color: #222; color: #aaa; text-align: center; padding: 15px 0; font-size: 13px;">
            <p style="margin: 0;">© 2026 TYTBOOKS. Nhà sách trực tuyến của sinh viên Lớp Công nghệ thông tin 2.K24 - Đại học Hải Phòng.</p>
            <p style="margin: 5px 0 0 0;">Thiết kế bởi Nhóm 9.</p>
        </div>
    </footer>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="shop-logic.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const container = document.getElementById('help-dynamic-content');
            if (!container) return;

            let checkDB = setInterval(() => {
                if (typeof db !== 'undefined') {
                    clearInterval(checkDB); 
                    
                    db.collection('settings').doc('helpPage').get()
                    .then(doc => {
                        if(doc.exists && doc.data().content) {
                            let rawContent = doc.data().content;
                            
                            // Tạo textarea ảo để giải mã các ký tự &lt; thành dấu <
                            let txt = document.createElement("textarea");
                            txt.innerHTML = rawContent;
                            
                            // In ra màn hình
                            container.innerHTML = txt.value;
                        } else {
                            container.innerHTML = '<p style="text-align:center;">Nội dung đang được cập nhật...</p>';
                        }
                    })
                    .catch(err => {
                        console.error("Lỗi lấy dữ liệu:", err);
                        container.innerHTML = '<p style="text-align:center; color:red;">Lỗi kết nối dữ liệu!</p>';
                    });
                }
            }, 300);
        });
    </script>
</body>
</html>
