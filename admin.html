<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Shop Sách</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f4f4f4; }
        .admin-box { background: white; padding: 20px; border-radius: 8px; max-width: 500px; margin: auto; }
        .input-group { margin-bottom: 15px; }
        .input-group input { width: 100%; padding: 8px; margin-top: 5px; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="admin-box">
        <h2>Thêm Sách Mới</h2>
      <form id="addBookForm">
            <div class="input-group">
                <label>Tên sách</label>
                <input type="text" id="bookTitle" required>
            </div>
            <div class="input-group">
                <label>Tác giả</label>
                <input type="text" id="bookAuthor" placeholder="Ví dụ: Toshikazu Kawaguchi">
            </div>
            
            <div class="input-group" style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label>Giá bán (VNĐ)</label>
                    <input type="number" id="bookPrice" required>
                </div>
                <div style="flex: 1;">
                    <label>Giá thị trường / Giá gốc (VNĐ)</label>
                    <input type="number" id="bookOriginalPrice" placeholder="Để tính % giảm giá">
                </div>
            </div>

            <div class="input-group" style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label>Nhà xuất bản</label>
                    <input type="text" id="bookPublisher">
                </div>
                <div style="flex: 1;">
                    <label>Số trang</label>
                    <input type="number" id="bookPages">
                </div>
            </div>

            <div class="input-group">
                <label>Link ảnh bìa sách (URL)</label>
                <input type="text" id="bookImage" required>
            </div>
            <div class="input-group">
                <label>Giới thiệu sản phẩm (Mô tả nội dung)</label>
                <textarea id="bookDescription" rows="5" style="width: 100%; padding: 8px; margin-top: 5px; font-family: inherit; border: 1px solid #ccc; border-radius: 4px;" placeholder="Nhập nội dung giới thiệu sách..."></textarea>
            </div>

            <button type="submit" style="width: 100%; margin-top: 10px;">Đăng Sản Phẩm Mới</button>
        </form>
        <p id="statusMsg"></p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    
    <script src="admin-logic.js"></script>
</body>
</html>
